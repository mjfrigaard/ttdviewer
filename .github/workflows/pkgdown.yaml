# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
# "2025-07-02-13.35.50"
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-22.04
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'release'
          # version: 1.4.515

      - name: Install pak
        run: |
          Rscript -e "
          cat('Platform pkgType:', .Platform\$pkgType, '\n')
          cat('R.Version os:', R.Version()\$os, '\n')
          cat('R.Version arch:', R.Version()\$arch, '\n')
          pak_repo <- sprintf(
            'https://r-lib.github.io/p/pak/%s/%s/%s/%s',
            'stable', .Platform\$pkgType, R.Version()\$os, R.Version()\$arch
          )
          cat('Installing pak from:', pak_repo, '\n')
          install.packages('pak', repos = pak_repo, quiet = FALSE)
          cat('pak installed:', as.character(packageVersion('pak')), '\n')
          "
        shell: bash

      - name: Check pak and GITHUB_PAT
        run: |
          Rscript -e "
          cat('pak version:', as.character(packageVersion('pak')), '\n')
          cat('GITHUB_PAT set:', nzchar(Sys.getenv('GITHUB_PAT')), '\n')
          cat('GITHUB_TOKEN set:', nzchar(Sys.getenv('GITHUB_TOKEN')), '\n')
          cat('Repo status:\n')
          tryCatch(pak::repo_status(), error = function(e) cat('repo_status error:', e\$message, '\n'))
          "
        shell: bash

      - name: Install GitHub packages
        run: |
          Rscript -e "
          Sys.setenv(PKGCACHE_HTTP_VERSION = '2')
          cat('Installing github packages...\n')
          tryCatch(
            pak::pak(c('github::long39ng/listviewerlite', 'github::r4ds/ttmeta')),
            error = function(e) { cat('ERROR:', e\$message, '\n'); quit(status = 1) }
          )
          cat('GitHub packages done.\n')
          "
        shell: bash

      - name: Install CRAN/local packages
        run: |
          Rscript -e "
          Sys.setenv(PKGCACHE_HTTP_VERSION = '2')
          cat('Installing CRAN/local packages...\n')
          tryCatch(
            pak::pak(c('deps::.', 'any::sessioninfo', 'any::pkgdown'), upgrade = FALSE),
            error = function(e) { cat('ERROR:', e\$message, '\n'); quit(status = 1) }
          )
          cat('CRAN/local packages done.\n')
          "
        shell: bash

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
