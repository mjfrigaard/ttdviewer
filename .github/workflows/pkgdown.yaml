# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
# "2025-07-02-13.35.50"
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-22.04
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'release'
          # version: 1.4.515

      - name: Debug R environment
        run: |
          R --version
          Rscript -e "cat('R_LIBS_USER:', Sys.getenv('R_LIBS_USER'), '\n')"
          Rscript -e "cat('R_LIBS_SITE:', Sys.getenv('R_LIBS_SITE'), '\n')"
          Rscript -e "cat('R_LIB_FOR_PAK:', Sys.getenv('R_LIB_FOR_PAK'), '\n')"
          Rscript -e "cat('RENV_PROJECT:', Sys.getenv('RENV_PROJECT'), '\n')"
          Rscript -e "cat('.libPaths():', paste(.libPaths(), collapse='; '), '\n')"
          Rscript -e "cat('.Platform$pkgType:', .Platform\$pkgType, '\n')"
          Rscript -e "cat('R.Version()$os:', R.Version()\$os, '\n')"
          Rscript -e "cat('R.Version()$arch:', R.Version()\$arch, '\n')"
          ls -la renv/ || echo "no renv dir"
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          pak-version: repo
          packages: |
            deps::.
            github::long39ng/listviewerlite
            github::r4ds/ttmeta
          extra-packages: any::sessioninfo, any::pkgdown
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
